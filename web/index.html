  <!--

    This is a placeholder for base href that will be replaced by the value of

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <meta name="theme-color" content="#1C6FB5">

  <!-- iOS / PWA meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>عون - AWAN</title>
  <link rel="manifest" href="manifest.json">

  <!-- ───────────── OneSignal Web Push (SDK v16) ─────────────
       The Flutter `onesignal_flutter` plugin does NOT support web, so on the
       PWA OneSignal lives entirely here in JS. Dart talks to it through the
       window.aoun* shims defined below (see lib/core/push/). -->
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    // Ask the user to allow push. MUST be called from a real user gesture
    // (a button tap) — required by iOS Safari 16.4+ installed PWAs.
    // Resolves true once permission is actually granted.
    window.aounRequestPushPermission = function () {
      return new Promise(function (resolve) {
        window.OneSignalDeferred.push(async function (OneSignal) {
          try {
            await OneSignal.Notifications.requestPermission();
            resolve(OneSignal.Notifications.permission === true);
          } catch (e) {
            console.error("[OneSignal] requestPermission failed", e);
            resolve(false);
          }
        });
      });
    };

    // Bind / unbind the Supabase user id as OneSignal's external_id so the
    // send-push edge function can target include_aliases.external_id.
    window.aounOneSignalLogin = function (externalId) {
      window.OneSignalDeferred.push(function (OneSignal) {
        OneSignal.login(externalId);
      });
    };
    window.aounOneSignalLogout = function () {
      window.OneSignalDeferred.push(function (OneSignal) {
        OneSignal.logout();
      });
    };

    // Current permission state (true = granted).
    window.aounPushPermission = function () {
      return new Promise(function (resolve) {
        window.OneSignalDeferred.push(function (OneSignal) {
          resolve(OneSignal.Notifications.permission === true);
        });
      });
    };

    // Whether this browser/context can receive web push at all.
    // (false on an iOS Safari tab that hasn't been added to the Home Screen.)
    window.aounPushSupported = function () {
      return new Promise(function (resolve) {
        window.OneSignalDeferred.push(function (OneSignal) {
          try {
            resolve(OneSignal.Notifications.isPushSupported() === true);
          } catch (e) {
            resolve(false);
          }
        });
      });
    };
  </script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function (OneSignal) {
      // Resolve the worker scope relative to <base href> so this works whether
      // the app is served from "/" or a subpath (e.g. "/app/").
      var swScope = new URL("onesignal/", document.baseURI).pathname;
      await OneSignal.init({
        // Public OneSignal App ID — keep in sync with ONESIGNAL_APP_ID in .env
        appId: "abb7b442-f4dc-4e76-a7fa-80a721ec2739",
        // Custom scope keeps OneSignal's worker out of Flutter's way.
        serviceWorkerParam: { scope: swScope },
        serviceWorkerPath: "onesignal/OneSignalSDKWorker.js",
        // Lets you test push from http://localhost during development.
        allowLocalhostAsSecureOrigin: true,
        // No bell widget and no auto-prompt — we prompt from a Dart button
        // so iOS' user-gesture requirement is satisfied.
        notifyButton: { enable: false },
        autoResubscribe: true,
      });
    });
  </script>
  <!-- ─────────────────────────────────────────────────────── -->
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.

</body>
