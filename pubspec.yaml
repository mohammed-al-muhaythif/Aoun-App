name: aoun_app
description: "AWAN - Club task & volunteer management for KSU Awan."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.5.6

  # Push notifications
  onesignal_flutter: ^5.2.0

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.6.0

  # Config / env
  flutter_dotenv: ^5.2.1

  # Secure local storage (session backup; supabase handles its own too)
  flutter_secure_storage: ^9.2.2

  # File picking for task attachments
  file_picker: ^8.1.4

  # Opening signed download URLs in the system browser
  url_launcher: ^6.3.1

  # Internationalization / date formatting (Arabic locale)
  intl: 0.20.2

  # Google Fonts (Cairo) for Arabic typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
