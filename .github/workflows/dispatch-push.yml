name: Dispatch Push Notifications

# Pings the Supabase `dispatch-push` Edge Function so any unsent rows in
# public.notifications are delivered to OneSignal as a single daily
# digest at 15:00 Riyadh time (= 12:00 UTC, since KSA is UTC+3).
#
# Trade-off: notifications (task assignments, comments, etc.) will be
# delayed by up to 24h before reaching the phone. Realtime in-app bell
# updates still work instantly via Supabase Realtime — only the OneSignal
# push to the device is batched.

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:  # allow manual triggering from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: POST dispatch-push
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is not set in repository secrets"
            exit 1
          fi
          status=$(curl -sS -o response.txt -w "%{http_code}" \
            -X POST \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "https://iqhezsojsphjftwengvk.supabase.co/functions/v1/dispatch-push")
          echo "HTTP $status"
          cat response.txt
          [ "$status" = "200" ]
